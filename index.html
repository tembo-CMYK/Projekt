<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projekt | Designer Workspace</title>
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="css/style.css?v=1.8">
</head>
<body>

  <div class="app-container">
    
    <!-- Workspace Sidebar Navigation -->
    <aside class="sidebar">
      <div class="logo-container">
        <div class="logo-icon">P</div>
        <span class="logo-text">Projekt</span>
      </div>

      <div class="profile-card">
        <img class="profile-avatar" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=150&q=80" alt="Amanda Smith" />
        <div class="profile-info">
          <span class="profile-name">Amanda Smith</span>
          <span class="profile-role">Professional Account</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <span class="nav-label">Workspace</span>
        <div class="nav-item active" data-view="dashboard">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.25" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
          </svg>
          Dashboard
        </div>
        <div class="nav-item" data-view="projects">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.25" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" />
          </svg>
          Projects Board
        </div>
        <div class="nav-item" data-view="clients">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.25" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128A9.321 9.321 0 0 1 12 19.5c-1.093 0-2.117-.187-3.07-.528M8 16.251a4.125 4.125 0 0 1-7.533 2.493 9.337 9.337 0 0 0 4.121.952 9.38 9.38 0 0 0 2.625-.372m0-3.072v.003c0-1.11-.288-2.152-.786-3.07M15 7.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm6 2.25a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Zm-13.5 0a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Z" />
          </svg>
          Clients Directory
        </div>
        <div class="nav-item" data-view="assets">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.25" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" />
          </svg>
          Asset Library
        </div>
        <div class="nav-item" data-view="finance">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.25" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
          </svg>
          Invoices & Contracts
        </div>
      </nav>


      <div class="upgrade-banner">
        <div class="upgrade-banner-glow"></div>
        <div class="upgrade-banner-icon">⚡</div>
        <div class="upgrade-title">Upgrade Workspace</div>
        <div class="upgrade-desc">Unlock unlimited projects, cloud storage, and premium AI features.</div>
        <button class="upgrade-cta-btn">Upgrade Now →</button>
      </div>
    </aside>

    <!-- Workspace Main Panel -->
    <main class="workspace-container">
      
      <!-- Top header bar -->
      <header class="workspace-header">
        <div class="header-search" style="position: relative; flex-grow: 1; max-width: 400px;">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.25" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.602 10.602Z" />
          </svg>
          <input type="text" id="workspace-search-input" placeholder="Search projects, clients, assets..." />
          <div id="search-results-dropdown" class="custom-dropdown-tray" style="display: none; position: absolute; top: 100%; left: 0; width: 100%; max-height: 320px; overflow-y: auto; z-index: 1000; margin-top: 8px; border: 1px solid var(--border-color); background-color: var(--bg-card); border-radius: var(--radius-md); padding: 8px 0; box-shadow: 0 10px 25px rgba(0,0,0,0.5);"></div>
        </div>
        <div class="header-actions" style="display: flex; align-items: center; gap: 14px;">
          <div id="header-clock" style="font-family: monospace; font-size: 13px; color: var(--tech-text); letter-spacing: 0.5px; font-weight: 400;"></div>
          <div style="position: relative; width: 180px;">
            <select id="timezone-select" style="font-size: 11px; padding: 6px 32px 6px 12px; width: 100%; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background-color: rgba(255,255,255,0.02); color: var(--text-muted);">
              <option value="Africa/Lusaka">Zambia (CAT / UTC+2)</option>
              <option value="Europe/Zurich">Switzerland (CET / UTC+1)</option>
              <option value="Europe/London">United Kingdom (GMT / UTC+0)</option>
              <option value="America/New_York">US Eastern (EST / UTC-5)</option>
              <option value="America/Los_Angeles">US Pacific (PST / UTC-8)</option>
            </select>
          </div>
        </div>
      </header>

      <!-- Panel views slot -->
      <div class="workspace-content">
        
        <!-- Dashboard Panel -->
        <section id="view-dashboard" class="panel-view active">
          <!-- Populated by JS -->
        </section>

        <!-- Projects Panel -->
        <section id="view-projects" class="panel-view">
          <!-- Populated by JS -->
        </section>

        <!-- Project Detail Sub-view is embedded inside Projects Panel, drawn dynamically -->

        <!-- Clients Panel -->
        <section id="view-clients" class="panel-view">
          <!-- Populated by JS -->
        </section>

        <!-- Finance Panel -->
        <section id="view-finance" class="panel-view">
          <!-- Populated by JS -->
        </section>
        
        <!-- Assets Panel -->
        <section id="view-assets" class="panel-view">
          <!-- Populated by JS -->
        </section>

      </div>
    </main>

  </div>

  <!-- Universal Modal Slot (Creates/Deletes/Previews) -->
  <div class="modal-overlay" id="universal-modal">
    <div class="modal-container">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Popup Title</span>
        <span class="modal-close">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.25" stroke="currentColor" style="width: 20px; height: 20px;"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
        </span>
      </div>
      <div class="modal-body" id="modal-body">
        <!-- Rendered via JS -->
      </div>
      <div class="modal-footer" id="modal-footer">
        <!-- Rendered via JS -->
      </div>
    </div>
  </div>

  <!-- Toast Notification Overlay Slot -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Main ES6 JS Entrypoint -->
  <script type="module" src="js/app.js?v=1.6"></script>
</body>
</html>
